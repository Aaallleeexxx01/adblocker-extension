<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdBlocker</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <div class="container">

    <!-- Header -->
    <header>
      <div class="logo">
        <img src="../icons/icon48.png" alt="AdBlocker" width="28" height="28">
        <span>AdBlocker</span>
      </div>
      <!-- Toggle switch -->
      <label class="toggle" title="Enable / disable ad blocking">
        <input type="checkbox" id="toggleEnabled" checked>
        <span class="slider"></span>
      </label>
    </header>

    <!-- Status banner -->
    <div id="statusBanner" class="status-banner active">
      <span id="statusText">Protection Active</span>
    </div>

    <!-- Stats -->
    <section class="stats">
      <div class="stat-card">
        <span class="stat-number" id="blockedCount">0</span>
        <span class="stat-label">Ads Blocked</span>
      </div>
      <div class="stat-card">
        <span class="stat-number" id="todayCount">0</span>
        <span class="stat-label">Today</span>
      </div>
    </section>

    <!-- Current site whitelist -->
    <section class="site-section">
      <div class="site-row">
        <span id="currentSite" class="site-name">Loading…</span>
        <button id="whitelistBtn" class="btn btn-secondary">Whitelist Site</button>
      </div>
    </section>

    <!-- Footer link to dashboard -->
    <footer>
      <button id="openDashboard" class="btn btn-link">📊 View Statistics Dashboard</button>
    </footer>

  </div>

  <script src="popup.js"></script>
</body>
</html>
